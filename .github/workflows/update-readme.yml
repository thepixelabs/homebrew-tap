name: Update README catalog table

on:
  push:
    branches: [main]
    paths:
      - 'Formula/*.rb'
      - 'Casks/*.rb'

permissions:
  contents: write

jobs:
  update-catalog:
    name: Regenerate catalog table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog table from .rb files
        run: |
          TABLE="| Name | Type | Version | Description | Install |"
          TABLE="$TABLE\n|------|------|---------|-------------|---------|"

          # Parse Casks
          for f in Casks/*.rb; do
            [ -f "$f" ] || continue
            NAME=$(ruby -e "File.read('$f').match(/cask \"(.+?)\"/); puts \$1" 2>/dev/null || true)
            DESC=$(ruby -e "File.read('$f').match(/desc \"(.+?)\"/); puts \$1" 2>/dev/null || true)
            VER=$(ruby -e "File.read('$f').match(/version \"(.+?)\"/); puts \$1" 2>/dev/null || true)
            [ -z "$NAME" ] && continue
            TABLE="$TABLE\n| $NAME | Cask | $VER | $DESC | \`brew install --cask thepixelabs/tap/$NAME\` |"
          done

          # Parse Formulas
          for f in Formula/*.rb; do
            [ -f "$f" ] || continue
            NAME=$(ruby -e "File.read('$f').match(/class (\w+) < Formula/); puts \$1&.gsub(/([a-z])([A-Z])/, '\\1-\\2')&.downcase" 2>/dev/null || true)
            DESC=$(ruby -e "File.read('$f').match(/desc \"(.+?)\"/); puts \$1" 2>/dev/null || true)
            VER=$(ruby -e "File.read('$f').match(/version \"(.+?)\"/); puts \$1" 2>/dev/null || true)
            [ -z "$NAME" ] && continue
            TABLE="$TABLE\n| $NAME | Formula | $VER | $DESC | \`brew install thepixelabs/tap/$NAME\` |"
          done

          # Replace content between markers in README.md
          START='<!-- AUTO-GENERATED: do not edit by hand, updated by .github\/workflows\/update-readme.yml -->'
          END='<!-- END AUTO-GENERATED -->'

          # Build the replacement block
          REPLACEMENT="${START}\n\n$(echo -e "$TABLE")\n\n${END}"

          # Use perl for reliable multiline replacement
          perl -0777 -i -pe "s|${START}.*?${END}|${REPLACEMENT}|s" README.md

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated README
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: regenerate catalog table [skip ci]"
          git push
