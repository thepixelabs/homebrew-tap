name: Update README catalog table

on:
  push:
    branches: [main]
    paths:
      - 'Formula/*.rb'
      - 'Casks/*.rb'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    name: Regenerate catalog table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog table from .rb files
        run: |
          # Use Python so the table content (pipe chars, newlines) is never
          # interpolated into a regex string — the previous Perl one-liner
          # broke when any formula name/desc contained '|' or newlines:
          #   perl -0777 -i -pe "s|${START}.*?${END}|${REPLACEMENT}|s"
          # injected the raw table into the Perl regex, causing
          # "syntax error … near 'Name'" on every run.
          python3 - <<'PYEOF'
          import re, glob, os

          START = '<!-- AUTO-GENERATED: do not edit by hand, updated by .github/workflows/update-readme.yml -->'
          END   = '<!-- END AUTO-GENERATED -->'

          rows = []
          rows.append('| Name | Type | Version | Description | Install |')
          rows.append('|------|------|---------|-------------|---------|')

          def extract(pattern, text, default=''):
              m = re.search(pattern, text)
              return m.group(1) if m else default

          # Parse Casks
          for path in sorted(glob.glob('Casks/*.rb')):
              text = open(path).read()
              name = extract(r'cask "(.+?)"', text)
              if not name:
                  continue
              desc = extract(r'desc "(.+?)"', text)
              ver  = extract(r'version "(.+?)"', text)
              rows.append(f'| {name} | Cask | {ver} | {desc} | `brew install --cask thepixelabs/tap/{name}` |')

          # Parse Formulas
          for path in sorted(glob.glob('Formula/*.rb')):
              text = open(path).read()
              m = re.search(r'class (\w+) < Formula', text)
              if not m:
                  continue
              # Convert CamelCase class name to kebab-case formula name
              raw = m.group(1)
              name = re.sub(r'([a-z])([A-Z])', r'\1-\2', raw).lower()
              desc = extract(r'desc "(.+?)"', text)
              # version stanza OR semver embedded in the URL (handles /vX.Y.Z/ too)
              ver = extract(r'version "(.+?)"', text) or \
                    extract(r'/v?([0-9]+\.[0-9]+\.[0-9]+)/', text)
              rows.append(f'| {name} | Formula | {ver} | {desc} | `brew install thepixelabs/tap/{name}` |')

          table_block = '\n'.join(rows)
          replacement = f'{START}\n\n{table_block}\n\n{END}'

          readme = open('README.md').read()
          # re.DOTALL so .* spans newlines between the markers
          updated = re.sub(
              re.escape(START) + r'.*?' + re.escape(END),
              replacement,
              readme,
              flags=re.DOTALL
          )
          open('README.md', 'w').write(updated)
          print('Updated README.md catalog table')
          PYEOF

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated README
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: regenerate catalog table [skip ci]"
          git push
