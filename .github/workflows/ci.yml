name: CI — brew audit + style

on:
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  audit:
    name: Audit changed formulas/casks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed .rb files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/main...HEAD | grep -E '^(Formula|Casks)/.*\.rb$' || true)
          if [ -z "$FILES" ]; then
            echo "No formula or cask files changed."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Register tap locally
        if: steps.changed.outputs.skip == 'false'
        run: brew tap --force thepixelabs/tap "$(pwd)"

      - name: Convert paths to tap-qualified names
        if: steps.changed.outputs.skip == 'false'
        id: names
        run: |
          # Homebrew 4.x requires `brew audit <name>`, not `brew audit <path>`
          NAMES=$(echo "${{ steps.changed.outputs.files }}" \
            | sed -E 's|Casks/(.*)\.rb|thepixelabs/tap/\1|g; s|Formula/(.*)\.rb|thepixelabs/tap/\1|g')
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"

      - name: brew audit --strict --online
        if: steps.changed.outputs.skip == 'false'
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: brew audit --strict --online ${{ steps.names.outputs.names }}

      - name: brew style
        if: steps.changed.outputs.skip == 'false'
        run: brew style ${{ steps.names.outputs.names }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: brew-audit-logs
          path: ~/Library/Logs/Homebrew/
          retention-days: 7
